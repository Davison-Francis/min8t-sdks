      additionalProperties: true

    SpamTrapAnalysisResponse:
      type: object
      required: [success, result]
      properties:
        success:
          type: boolean
          example: true
        result:
          type: object
          required: [riskLevel, trapType, score, signals]
          properties:
            riskLevel:
              type: string
              example: low
            trapType:
              type: string
              example: none
            score:
              type: number
              format: float
              minimum: 0
              maximum: 1
            signals:
              $ref: '#/components/schemas/SpamTrapSignals'

    DomainTrust:
      type: object
      required: [score, level]
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
