            companyName:
              type: string
              example: Example Corp
            industry:
              type: string
              example: Technology
            employees:
              type: string
              example: 51-200
            primaryPattern:
              type: string
              description: Most common email pattern at this domain
              example: '{first}.{last}'
            socialProfiles:
              type: object
              properties:
                linkedin:
                  type: string
                  format: uri
                twitter:
                  type: string
                  format: uri

