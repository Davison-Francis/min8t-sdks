          type: string
          example: high

    DomainIntelResponse:
      type: object
      required: [success, domain, result]
      properties:
        success:
          type: boolean
          example: true
        domain:
          type: string
        result:
          type: object
          required: [mx, dnsbl, infrastructure, domainAge, domainTrust]
          properties:
            mx:
              $ref: '#/components/schemas/MxResult'
            dnsbl:
              type: object
              required: [listed, hits, checkedZones]
