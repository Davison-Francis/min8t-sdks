    # ── Domain Intelligence ────────────────────
    DnsblHit:
      type: object
      required: [zone, listed, returnCode]
      properties:
        zone:
          type: string
          example: zen.spamhaus.org
        listed:
          type: boolean
        returnCode:
          type: string
          example: 127.0.0.2

    BlacklistCheckResponse:
      type: object
      required: [success, domain, result]
      properties:
        success:
          type: boolean
          example: true
        domain:
          type: string
        result:
          type: object
          required: [listed, hits, checkedZones]
          properties:
            listed:
              type: boolean
            hits:
              type: array
              items:
                $ref: '#/components/schemas/DnsblHit'
            checkedZones:
              type: integer
              example: 50

    SpfRecord:
      type: object
      properties:
        found:
          type: boolean
        record:
          type: string
        valid:
          type: boolean
        issues:
          type: array
          items:
            type: string

    DkimRecord:
      type: object
      properties:
        found:
          type: boolean
        selector:
          type: string
        valid:
          type: boolean

    DmarcRecord:
      type: object
      properties:
        found:
          type: boolean
        record:
          type: string
        policy:
          type: string
          enum: [none, quarantine, reject]

    MtaStsRecord:
      type: object
      properties:
        found:
          type: boolean
        mode:
          type: string
          enum: [enforce, testing, none]

